# ZimaOS optimized compose for Keyku.
# Uses the prebuilt GHCR image and stores persistent data below /DATA/AppData/keyku.

services:
  keyku:
    image: ghcr.io/maroishiku/keyku:latest
    container_name: keyku
    restart: unless-stopped
    pull_policy: always
    init: true

    ports:
      - "8080:3000"

    volumes:
      - /DATA/AppData/keyku/data:/data

    secrets:
      - ishiku_setup_secret

    environment:
      - TZ=Europe/Berlin
      - ISHIKU_APP_URL=
      - ISHIKU_BASE_PATH=/
      - ISHIKU_DATA_DIR=/data
      - ISHIKU_LOG_LEVEL=info
      - ISHIKU_TRUST_PROXY=false
      - ISHIKU_SETUP_SECRET_FILE=/run/secrets/ishiku_setup_secret
      - PORT=3000
      - PUBLIC_DIR=/app/public

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

secrets:
  ishiku_setup_secret:
    file: /DATA/AppData/keyku/secrets/setup_secret.txt
